# Profile-as-Template metadata catalog (Phase 3A of parsing-architecture refactor).
#
# Each entry describes what a parser profile is *meant* to handle:
#   - the schedule codes / rider codes the template targets,
#   - the families / utilities it serves,
#   - a "scope" hint for future Phase 4 routing decisions.
#
# This file is read-only metadata. It does NOT change extraction behavior.
# Phase 3B's Tier 1 binder consumes it to decide which template to apply
# for a given consensus profile name.
#
# Plan ref: docs/PARSING_ARCHITECTURE_REFACTOR_PLAN.md §6.3A.
#
# Schema (per template):
#   <profile_name>:
#     description:    one-line human summary
#     utility:        which utility/company the template serves
#                     (DEP | DEC | NAN | progress | carolinas | any)
#     state:          jurisdiction (NC | SC | any)
#     scope:          'template-level' (uniform across many docs)
#                   | 'anchor-required' (regex must include doc-specific anchor)
#                   | 'bundle-aware' (handles multi-tariff bundles)
#                   | 'redline-aware'
#     intended_schedule_codes: [list of codes the template is meant to parse]
#     intended_rider_codes:    [list of rider codes the template handles]
#     intended_families:       [family_key prefixes/values it covers]
#     notes: |
#       Free-form context — known limitations, related templates, etc.
#
# Conventions:
#   - When in doubt about a template's intended codes, leave the list empty
#     and add a TODO note. The Phase 3C comparison run will surface gaps.
#   - "any" for utility/state means the template is intentionally generic.
#   - 'template-level' scope means all docs that consensus-bind to this
#     template will use the same regex set. 'anchor-required' means the
#     binder should refuse Tier 1 binding here and downgrade to Tier 2/3
#     until per-doc anchors are present.

generic_residential:
  description: "Catch-all residential template; the historical default for unrouted docs"
  utility: any
  state: any
  scope: template-level
  intended_schedule_codes: [RES-28, RES-50, RES-51, RES-57]
  intended_rider_codes: []
  intended_families: [residential, dep_residential, dec_residential]
  notes: |
    Used as the historical default. Many docs land here that should route
    elsewhere (MGS, SGS, riders). Phase 3B should treat consensus-bind to
    generic_residential cautiously — if the doc has high-specificity
    non-residential schedule codes, the binder should refuse and let
    Phase 4 per-doc rules take over.

